name: deploy
on:
  push:
    branches: [main]
concurrency:
  group: deploy-main
  cancel-in-progress: false
permissions:
  contents: read
  checks: write
  pull-requests: read
  actions: read
jobs:
  deploy:
    uses: ship-iac/shipmate/.github/workflows/deploy.yml@b01dd86affbe43b93efb7a46ac60aaa3b0bf423d
    permissions: { contents: read, checks: write, statuses: write, pull-requests: read, actions: read }
    secrets: inherit
    with:
      state_suffix: terraform.tfstate.d
